<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TABU v.1.8.1</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:sans-serif}
body{background:#0b141a;color:#e9edef;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
#top-bar{background:#202d36;height:50px;display:flex;align-items:center;padding:0 15px;justify-content:space-between;flex-shrink:0;z-index:100}
#main-container{flex:1;display:flex;overflow:hidden;position:relative}
#sidebar{width:30%;background:#111b21;border-right:1px solid #2a3942;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
#main-chat{width:70%;background:#0b141a;display:flex;flex-direction:column;position:relative}
.header{background:#202d36;padding:0 15px;height:50px;display:flex;align-items:center;flex-shrink:0;border-bottom:1px solid #2a3942}
#chat-box{flex:1;overflow-y:auto;padding:15px;display:flex;flex-direction:column;gap:4px}
#input-area{background:#202d36;padding:10px;display:flex;gap:10px;min-height:60px;align-items:center;flex-shrink:0}
input{flex:1;background:#2a3942;border:none;color:#fff;padding:12px;border-radius:8px;outline:none}
button{background:#00a884;border:none;color:#fff;height:40px;padding:0 20px;border-radius:8px;cursor:pointer}
.list-item{padding:15px;border-bottom:1px solid #222d34;cursor:pointer;display:flex;align-items:center;gap:10px}
.status-dot{width:8px;height:8px;border-radius:50%;background:#8696a0}
.online{background:#00a884}
.msg{max-width:85%;padding:8px;border-radius:8px;margin-bottom:2px;font-size:14px;word-wrap:break-word}
.out{align-self:flex-end;background:#005c4b;border-bottom-right-radius:2px}
.in{align-self:flex-start;background:#202d36;border-bottom-left-radius:2px}
@media (max-width:768px){
#sidebar{width:100%;position:absolute;height:100%;z-index:1}
#main-chat{width:100%;position:absolute;height:100%;transform:translateX(100%);transition:0.3s;z-index:50}
#main-chat.active{transform:translateX(0)}
.back-btn{display:block !important}
}
</style>
</head>
<body>
<div id="top-bar">
    <div style="font-size:12px"><b>TABU v.1.8.1</b> | <span id="my-login">...</span></div>
    <div onclick="logout()" style="cursor:pointer;font-size:18px;padding:5px">🚪</div>
</div>
<div id="main-container">
    <div id="sidebar">
        <div class="list-item" onclick="setT(65535, '📢 ОБЩИЙ ЧАТ')">📢 ОБЩИЙ ЧАТ</div>
        <div id="user-list"></div>
    </div>
    <div id="main-chat">
        <div class="header">
            <button class="back-btn" style="display:none;background:none;color:#00a884;border:none;margin-right:10px;font-size:20px" onclick="tgl(0)">←</button>
            <span id="c-title">Выберите чат</span>
        </div>
        <div id="chat-box"></div>
        <div id="input-area"><input type="text" id="m-i" placeholder="Сообщение..."><button onclick="snd()">></button></div>
    </div>
</div>
<script>
let ws, curID=65535;
const myUID=localStorage.getItem('uid'), myLogin=localStorage.getItem('login'), roster={};
const box=document.getElementById('chat-box'), inp=document.getElementById('m-i'), mc=document.getElementById('main-chat');

if(!myUID) location.href='/auth.html';
document.getElementById('my-login').innerText = myLogin;

function cnct(){
    ws=new WebSocket(`ws://${location.hostname}:81/`);
    ws.binaryType="arraybuffer";
    ws.onopen=()=>{
        const loginData = new TextEncoder().encode(myLogin);
        const p=new ArrayBuffer(5 + loginData.length), v=new DataView(p);
        v.setUint8(0, 0x61); v.setUint16(3, parseInt(myUID), true);
        new Uint8Array(p).set(loginData, 5); ws.send(p);
        setInterval(()=>{ if(ws.readyState===1) ws.send(new Uint8Array([0x31,0,0,myUID&0xFF,myUID>>8,0])); }, 260000);
    };
    ws.onmessage=(e)=>{
        const v=new DataView(e.data), t=v.getUint8(0)&0x0F;
        if(t===6){
            const uid=v.getUint16(5,true), name=new TextDecoder().decode(e.data.slice(9)).replace(/\0/g,'');
            if(uid!=myUID && !roster[uid]){
                roster[uid]=name;
                document.getElementById('user-list').innerHTML+=`<div class="list-item" onclick="setT(${uid},'👤 ${name}')"><div id="dot-${uid}" class="status-dot online"></div>👤 ${name}</div>`;
            }
        }
        if(t===3){
            const uid=v.getUint16(3,true), dot=document.getElementById(`dot-${uid}`);
            if(dot){ dot.classList.add('online'); setTimeout(()=>dot.classList.remove('online'),280000); }
        }
        if(t===1) push(new TextDecoder().decode(e.data.slice(7)), 'in');
    };
    ws.onclose=()=>setTimeout(cnct, 2000);
}

function snd(){
    if(!inp.value || !ws || ws.readyState !== 1) return;
    const d=new TextEncoder().encode(inp.value), p=new ArrayBuffer(7+d.length), v=new DataView(p);
    v.setUint8(0, 0x11); v.setUint16(3, curID, true);
    new Uint8Array(p).set(d, 7); ws.send(p); push(inp.value, 'out'); inp.value='';
}

function push(t,c){
    const d=document.createElement('div'); d.className=`msg ${c}`; d.innerText=t;
    box.appendChild(d); box.scrollTop=box.scrollHeight;
}

function logout(){ localStorage.clear(); location.href='/auth.html'; }
function setT(id,txt){ curID=id; document.getElementById('c-title').innerText=txt; tgl(1); }
function tgl(v){ v ? mc.classList.add('active') : mc.classList.remove('active'); }
inp.onkeydown=(e)=>{if(e.key==='Enter')snd()};
cnct();
</script>
</body>
</html>
