<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>TABU</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:sans-serif}
body{background:#0b141a;color:#e9edef;height:100%;overflow:hidden;position:fixed;width:100%}

#top-bar{background:#202d36;height:50px;display:flex;align-items:center;padding:0 15px;justify-content:space-between;z-index:100;position:relative}
#main-container{height:calc(100% - 50px);display:flex;position:relative}

#sidebar{width:30%;background:#111b21;border-right:1px solid #2a3942;display:flex;flex-direction:column;overflow-y:auto}
#main-chat{width:70%;background:#0b141a;display:flex;flex-direction:column;position:relative;height:100%}

.header{background:#202d36;padding:0 15px;height:50px;display:flex;align-items:center;flex-shrink:0;border-bottom:1px solid #2a3942}

/* Область чата с отступом под фиксированный ввод */
#chat-box{flex:1;overflow-y:auto;padding:15px;display:flex;flex-direction:column;gap:8px;padding-bottom:70px}

/* ФИКСИРОВАННОЕ ПОЛЕ ВВОДА */
#input-area{
    background:#202d36;
    padding:10px;
    display:flex;
    gap:10px;
    height:60px;
    align-items:center;
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    z-index:10;
}

input{flex:1;background:#2a3942;border:none;color:#fff;padding:12px;border-radius:8px;outline:none;font-size:16px} /* font-size 16px предотвращает автозум в iOS */
button{background:#00a884;border:none;color:#fff;height:40px;padding:0 20px;border-radius:8px;cursor:pointer}

.list-item{padding:15px;border-bottom:1px solid #222d34;cursor:pointer;display:flex;align-items:center;gap:10px}
.list-item.active{background:#2a3942}
.msg{max-width:80%;padding:8px 12px;border-radius:10px;font-size:14px;word-wrap:break-word;position:relative;display:flex;flex-direction:column}
.out{align-self:flex-end;background:#005c4b;border-bottom-right-radius:2px}
.in{align-self:flex-start;background:#202d36;border-bottom-left-radius:2px}
.meta{font-size:10px;opacity:0.6;margin-bottom:3px;font-weight:bold}
.ts{font-size:9px;align-self:flex-end;margin-top:2px;opacity:0.5}

@media (max-width:768px){
    #sidebar{width:100%;position:absolute;height:100%;z-index:1}
    #main-chat{width:100%;position:absolute;height:100%;transform:translateX(100%);transition:0.3s;z-index:50}
    #main-chat.active{transform:translateX(0)}
    .back-btn{display:block !important}
}
</style>
</head>
<body>
<div id="top-bar">
    <div style="font-size:12px"><b id="proj-meta">TABU</b> | <span id="display-name">...</span></div>
    <div onclick="logout()" style="cursor:pointer;font-size:18px;padding:5px">🚪</div>
</div>
<div id="main-container">
    <div id="sidebar">
        <div id="item-65535" class="list-item active" onclick="setT(65535, '📢 ОБЩИЙ ЧАТ')">📢 ОБЩИЙ ЧАТ</div>
        <div id="user-list"></div>
    </div>
    <div id="main-chat">
        <div class="header"><button class="back-btn" style="display:none;background:none;color:#00a884;padding:10px;border:none;font-size:20px" onclick="tgl(0)">←</button>Чат: <span id="c-title">ОБЩИЙ ЧАТ</span></div>
        <div id="chat-box"></div>
        <div id="input-area">
            <input type="text" id="m-i" placeholder="Сообщение..." autocomplete="off">
            <button onclick="snd()">></button>
        </div>
    </div>
</div>

<script>
let ws, curID=65535, roster={}, myLogin=localStorage.getItem('login'), myUID=parseInt(localStorage.getItem('uid')), historyStore={65535:[]};

// ПРЕДОТВРАЩЕНИЕ СКРЫТИЯ ПОД КЛАВИАТУРОЙ
if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', () => {
        let viewHeight = window.visualViewport.height;
        document.body.style.height = viewHeight + 'px';
        window.scrollTo(0, 0);
        document.getElementById('chat-box').scrollTop = 999999;
    });
}

window.onload=()=>{
    if(!myLogin || isNaN(myUID)) { location.href='/auth.html'; return; }
    document.getElementById('display-name').innerText = myLogin;
    loadMeta(); cnct();
};

async function loadMeta(){ try{const r=await fetch('/info'); const d=await r.json(); document.getElementById('proj-meta').innerText=`${d.name} v.${d.ver}`;}catch(e){} }

function cnct(){
    ws=new WebSocket(`ws://${location.hostname}:81/`); ws.binaryType="arraybuffer";
    ws.onopen=()=>{ const p=new ArrayBuffer(9), v=new DataView(p); v.setUint8(0, 0x66); v.setUint16(3, myUID, true); ws.send(p); };
    ws.onmessage=(e)=>{
        const v=new DataView(e.data), t=v.getUint8(0)&0x0F;
        if(t===6){
            const uid=v.getUint16(3,true), name=new TextDecoder().decode(e.data.slice(9)).replace(/\0/g,'');
            if(uid !== myUID && !roster[uid] && uid !== 0) {
                roster[uid] = name; historyStore[uid] = [];
                const div = document.createElement('div'); div.id = `item-${uid}`; div.className = 'list-item';
                div.onclick = () => setT(uid, `👤 ${name}`); div.innerText = `👤 ${name}`;
                document.getElementById('user-list').appendChild(div);
            }
        }
        if(t===1){
            const dest=v.getUint16(3,true), sid=v.getUint16(5,true), ts=v.getUint32(7,true), txt=new TextDecoder().decode(e.data.slice(11));
            let chatUID = (dest === 65535) ? 65535 : (sid === myUID ? dest : sid);
            if (!historyStore[chatUID]) historyStore[chatUID] = [];
            const msgObj = { txt, type: sid===myUID?'out':'in', name: sid===myUID?"Вы":(roster[sid]||"ID:"+sid), time: new Date(ts*1000).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) };
            historyStore[chatUID].push(msgObj);
            if(chatUID === curID) renderMsg(msgObj);
        }
    };
    ws.onclose=()=>setTimeout(cnct, 2000);
}

function snd(){
    const i=document.getElementById('m-i'); if(!i.value || !ws || ws.readyState!==1) return;
    const txtArr=new TextEncoder().encode(i.value), p=new ArrayBuffer(11+txtArr.length), v=new DataView(p);
    v.setUint8(0, 0x11); v.setUint16(3, curID, true); v.setUint16(5, myUID, true); v.setUint32(7, Math.floor(Date.now()/1000), true);
    new Uint8Array(p).set(txtArr, 11); ws.send(p); i.value='';
}

function renderMsg(m){
    const d=document.createElement('div'); d.className=`msg ${m.type}`;
    d.innerHTML=`<span class="meta">${m.name}</span><div>${m.txt}</div><span class="ts">${m.time}</span>`;
    const b=document.getElementById('chat-box'); b.appendChild(d); b.scrollTop=b.scrollHeight;
}

function setT(id, title){
    document.getElementById(`item-${curID}`)?.classList.remove('active');
    curID = id; document.getElementById(`item-${curID}`)?.classList.add('active');
    document.getElementById('c-title').innerText = title;
    const box = document.getElementById('chat-box'); box.innerHTML = '';
    (historyStore[id] || []).forEach(renderMsg); tgl(1);
}

function tgl(v){ const mc=document.getElementById('main-chat'); v ? mc.classList.add('active') : mc.classList.remove('active'); }
function logout(){ localStorage.clear(); document.cookie="auth=; Max-Age=0; path=/;"; location.href='/auth.html'; }
document.getElementById('m-i').onkeydown=(e)=>{if(e.key==='Enter')snd()};
</script>
</body>
</html>
